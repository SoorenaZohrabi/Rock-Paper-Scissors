<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./scss/style.css">
  <script src="./js/app.js" defer></script>
</head>


<body>

  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="#">
        Rock Paper Scissors
      </a>
    </div>
  </nav>

  <section class="hero">
    <div class="container text-center">
      <h1>Rock Paper Scissors</h1>
      <p>Challenge the computer and test your luck!</p>
    </div>
  </section>

  <!-- Game Section -->
  <section class="game-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="game-card">
            <h2>Choose Your Move</h2>
            <div class="choices">
              <button class="choice" data-choice="rock">
                ✊
                <span>Rock</span>
              </button>
              <button class="choice" data-choice="paper">
                ✋
                <span>Paper</span>
              </button>
              <button class="choice" data-choice="scissors">
                ✌️
                <span>Scissors</span>
              </button>
            </div>
            <div class="battle">
              <div>
                <h4>You</h4>
                <p id="player-choice">❔</p>
              </div>
              <h3>VS</h3>
              <div>
                <h4>Computer</h4>
                <p id="computer-choice">❔</p>
              </div>
            </div>

            <h3 id="result">Waiting...</h3>

            <div class="score">
              <div>Player<span id="player-score">0</span></div>
              <div>Computer<span id="computer-score">0</span></div>
            </div>

            <button id="restart-btn" class="btn btn-secondary mt-4">Restart</button>
          </div>
        </div>
      </div>
    </div>

  </section>

  <footer>
    <p>
      Designed by
      <span>Soorena Zohrabi</span>
    </p>
  </footer>

</body>

</html>
